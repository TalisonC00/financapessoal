<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Pro 🛠️</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3799">
    <link rel="apple-touch-icon" href="logo.jpg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #00d2ff; --bg-dark: #121212; --card-dark: #1e1e1e; --income: #00b894; --expense: #ff7675; }
        body { background-color: var(--bg-dark); color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .premium-header { background: linear-gradient(135deg, #0f0c29, #302b63); padding: 45px 20px 65px; border-radius: 0 0 30px 30px; }
        .header-labels { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .card-premium { background: var(--card-dark); border: 1px solid #333; border-radius: 16px; margin-bottom: 15px; }
        .form-control, .form-select { background: #252525; border: 1px solid #444; color: white; border-radius: 10px; }
        
        /* CORREÇÃO DE LEGIBILIDADE: PLACEHOLDER MAIS CLARO */
        .form-control::placeholder { color: #aaaaaa; opacity: 1; }
        
        .nav-pills { background: #252525; border-radius: 12px; padding: 5px; }
        .nav-link { color: #aaaaaa; font-weight: 600; border-radius: 10px !important; }
        .nav-link.active { background-color: var(--accent) !important; color: #000 !important; }
        .btn-main { background: var(--accent); border: none; border-radius: 12px; padding: 15px; font-weight: 800; color: #000; width: 100%; text-transform: uppercase; }
        #install-banner { display: none; position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 92%; }
        
        /* CORREÇÃO DE LEGIBILIDADE: TEXTO MUTED MAIS CLARO */
        .text-muted { color: #bbbbbb !important; }
        .btn-limpar { color: #aaaaaa !important; opacity: 0.7; background: none; border: none; }
        .btn-limpar:hover { opacity: 1; color: var(--expense) !important; }
    </style>
</head>
<body class="pb-5">

    <div id="install-banner">
        <div class="card p-3 text-center border-0 shadow-lg" style="background: #1e1e1e; border-radius: 15px; border: 1px solid var(--accent) !important;">
            <p class="mb-2 small fw-bold" style="color: var(--accent);">Instalar Finanças Pro na Tela Inicial? 🛠️</p>
            <button id="btn-install" class="btn btn-main py-2">Instalar Agora</button>
        </div>
    </div>

    <div class="premium-header text-center">
        <small class="text-uppercase" style="letter-spacing: 2px; opacity: 0.6;">Saldo Consolidado</small>
        <h1 class="display-4 fw-bold mb-3" id="resumoSaldo">R$ 0,00</h1>
        <div class="d-flex justify-content-center gap-2">
            <div class="header-labels small"><i class="bi bi-graph-up-arrow text-success"></i> <span id="resumoEntradas">R$ 0,00</span></div>
            <div class="header-labels small"><i class="bi bi-graph-down-arrow text-danger"></i> <span id="resumoSaidas">R$ 0,00</span></div>
        </div>
    </div>

    <div class="container mt-n3" style="margin-top: -35px; position: relative; z-index: 10;">
        <ul class="nav nav-pills nav-fill mb-4 shadow-lg" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#aba-novo"><i class="bi bi-plus-square"></i></button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-extrato"><i class="bi bi-activity"></i></button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-poupanca"><i class="bi bi-shield-lock"></i></button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="aba-novo">
                <div class="card card-premium p-4">
                    <select id="mes" class="form-select mb-3" onchange="renderizar()"></select>
                    <div class="btn-group w-100 mb-3">
                        <input type="radio" class="btn-check" name="tipo" id="tipoEntrada" value="Entrada" checked>
                        <label class="btn btn-outline-success" for="tipoEntrada">Entrada</label>
                        <input type="radio" class="btn-check" name="tipo" id="tipoSaida" value="Saída">
                        <label class="btn btn-outline-danger" for="tipoSaida">Saída</label>
                    </div>
                    <input type="text" id="desc" class="form-control mb-2" placeholder="Descrição (Ex: Salário, Mercado)">
                    <input type="number" id="valor" class="form-control mb-4" placeholder="Valor (R$)">
                    <button onclick="adicionarRegistro()" class="btn-main">Lançar Transação</button>
                </div>
            </div>
            <div class="tab-pane fade" id="aba-extrato"><div id="listaExtrato"></div></div>
            <div class="tab-pane fade" id="aba-poupanca">
                <div class="card card-premium p-4 text-center">
                    <h2 class="fw-bold mb-4" id="totalCofre">R$ 0,00</h2>
                    <input type="number" id="valorPoupanca" class="form-control mb-3 text-center" placeholder="Valor R$">
                    <div class="d-flex gap-2">
                        <button onclick="gerirPoupanca('add')" class="btn btn-main py-2">Depositar</button>
                        <button onclick="gerirPoupanca('sub')" class="btn btn-outline-danger w-100 py-2 border-2">Resgatar</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <button onclick="limparTudo()" class="btn-limpar">Limpar Base de Dados</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let dados = JSON.parse(localStorage.getItem('financas_masc_v2')) || { transacoes: [], cofre: 0 };
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const seletorMes = document.getElementById('mes');
        meses.forEach(m => seletorMes.innerHTML += `<option ${m === meses[new Date().getMonth()] ? 'selected' : ''}>${m}</option>`);
        function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function adicionarRegistro() {
            const mes = document.getElementById('mes').value, desc = document.getElementById('desc').value, valor = parseFloat(document.getElementById('valor').value) || 0;
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            if (!desc || valor <= 0) return alert("Preencha!");
            dados.transacoes.push({ id: Date.now(), mes, desc, valor, tipo }); salvar();
            document.getElementById('desc').value = ""; document.getElementById('valor').value = "";
        }
        function removerRegistro(id) { if(confirm("Remover?")) { dados.transacoes = dados.transacoes.filter(t => t.id !== id); salvar(); } }
        function gerirPoupanca(t) {
            const v = parseFloat(document.getElementById('valorPoupanca').value) || 0;
            if (v <= 0) return;
            dados.cofre = (t === 'add') ? dados.cofre + v : dados.cofre - v;
            document.getElementById('valorPoupanca').value = ""; salvar();
        }
        function salvar() { localStorage.setItem('financas_masc_v2', JSON.stringify(dados)); renderizar(); }
        function renderizar() {
            const mesAtual = document.getElementById('mes').value, lista = document.getElementById('listaExtrato'); lista.innerHTML = "";
            let entM = 0, saiM = 0;
            dados.transacoes.filter(t => t.mes === mesAtual).forEach(t => {
                const isE = t.tipo === "Entrada";
                if(isE) entM += t.valor; else saiM += t.valor;
                lista.innerHTML += `<div class="card card-premium p-3 mb-2" style="border-left: 4px solid ${isE ? 'var(--income)' : 'var(--expense)'} !important;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2"><i class="bi bi-trash3 text-muted" onclick="removerRegistro(${t.id})"></i>
                        <strong>${t.desc}</strong></div>
                        <div class="${isE ? 'text-success' : 'text-danger'} fw-bold">${isE ? '+' : '-'} ${formatar(t.valor)}</div>
                    </div></div>`;
            });
            document.getElementById('resumoEntradas').innerText = formatar(entM); document.getElementById('resumoSaidas').innerText = formatar(saiM);
            document.getElementById('resumoSaldo').innerText = formatar(entM - saiM); document.getElementById('totalCofre').innerText = formatar(dados.cofre);
        }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-banner').style.display = 'block'; });
        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none'; deferredPrompt = null;
            } else { alert("Use o menu do Chrome > Instalar"); }
        });
        function limparTudo() { if(confirm("CUIDADO: Apagar tudo?")) { dados = { transacoes: [], cofre: 0 }; salvar(); } }
        renderizar();
    </script>
</body>
</html>
