<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Pro 🛠️</title>
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=5">
    <meta name="theme-color" content="#121212">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --accent: #2ecc71; 
            --bg: #121212; 
            --card: #1e1e1e; 
            --in: #2ecc71; 
            --out: #e74c3c; 
            --text-muted: #888888; 
            --border: #333333;
            --input-bg: #252525;
        }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER COM GRADIENTE ESCURO */
        .premium-header { 
            background: linear-gradient(135deg, #0f0c29, #1b3a1b); 
            padding: 40px 20px 60px; border-radius: 0 0 30px 30px; text-align: center; 
        }
        
        /* SELETOR DE MÊS NO TOPO */
        .month-selector-top { max-width: 150px; margin: 0 auto; background: rgba(255, 255, 255, 0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; font-weight: bold; border-radius: 50px; text-align-last: center; font-size: 0.9rem; }
        
        /* LABELS DO HEADER */
        .h-label { background: rgba(255, 255, 255, 0.08); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); flex: 1; font-size: 0.9rem; }

        /* NAVEGAÇÃO PRO */
        .nav-custom { background: #252525; border-radius: 12px; display: flex; padding: 5px; margin: -30px 15px 20px; position: relative; z-index: 20; border: 1px solid var(--border); }
        .nav-item-custom { flex: 1; text-align: center; padding: 10px; color: #888; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .nav-item-custom.active { background: var(--accent); color: #000; font-weight: bold; }

        .aba-content { display: none; }
        .aba-content.active { display: block; }

        /* CARDS E INPUTS PRO */
        .card-p { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 15px; padding: 20px; }
        
        /* CORREÇÃO: Campos de texto visíveis */
        .form-control { background-color: var(--input-bg) !important; border: 1px solid var(--border) !important; color: #fff !important; margin-bottom: 12px; border-radius: 10px; padding: 12px; }
        .form-control::placeholder { color: #666 !important; }
        .form-control:focus { background-color: #2a2a2a !important; border-color: var(--accent) !important; box-shadow: none; color: #fff !important; }

        /* BOTÕES PRO */
        .btn-m { border: none; border-radius: 12px; padding: 14px; font-weight: 800; width: 100%; text-transform: uppercase; transition: 0.3s; color: #000; }
        .btn-m.btn-active { opacity: 1 !important; cursor: pointer; }
        .btn-m:not(.btn-active) { opacity: 0.3; cursor: not-allowed; }

        .btn-verde { background-color: var(--in); }
        .btn-vermelho { background-color: var(--out); color: #fff; }
        
        /* BOTÃO RESGATAR (PADRÃO VISUAL SEMELHANTE) */
        .btn-outline-danger-pro { background-color: transparent; border: 2px solid var(--out); color: var(--out); border-radius: 12px; font-weight: 800; text-transform: uppercase; width: 100%; padding: 12px; transition: 0.3s; opacity: 0.3; }
        .btn-outline-danger-pro.btn-active { background-color: var(--out); color: white; opacity: 1; }

        /* TOAST E MODAL PRO */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 50px; border: 1px solid var(--accent); z-index: 9999; display: none; }
        #modalConfirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-box { background: #1e1e1e; padding: 25px; border-radius: 20px; text-align: center; width: 85%; border: 1px solid var(--border); }
        
        /* ITENS DE LISTA */
        .comentario-box { color: #ffffff; font-size: 0.85rem; margin-top: 8px; opacity: 0.8; border-top: 1px solid #333; padding-top: 5px; font-weight: 400; }
        .hist-cofre-item { border-bottom: 1px solid #333; padding: 10px 0; font-size: 0.85rem; }
    </style>
</head>
<body class="pb-5">

    <div id="toast"></div>

    <div id="modalConfirm">
        <div class="modal-box">
            <h5 class="mb-3">Deseja apagar este registro? 🗑️</h5>
            <div class="d-flex gap-2">
                <button onclick="fecharModal()" class="btn btn-secondary w-100 rounded-pill">Cancelar</button>
                <button id="btnConfirmarDelete" class="btn btn-danger w-100 rounded-pill">Apagar</button>
            </div>
        </div>
    </div>

    <div class="premium-header">
        <select id="mes" class="form-select month-selector-top mb-3" onchange="renderizar()"></select>
        <small class="text-uppercase opacity-50" style="letter-spacing: 1px; font-size: 0.7rem;">Saldo Consolidado</small>
        <h1 class="display-4 fw-bold mb-3" id="resumoSaldo" style="letter-spacing: -1px;">R$ 0,00</h1>
        <div class="d-flex gap-2 mt-2">
            <div class="h-label"><i class="bi bi-arrow-up text-success"></i> <span id="resumoEntradas">R$ 0,00</span></div>
            <div class="h-label"><i class="bi bi-arrow-down text-danger"></i> <span id="resumoSaidas">R$ 0,00</span></div>
        </div>
    </div>

    <div class="nav-custom shadow-sm">
        <div class="nav-item-custom active" onclick="trocarAba('aba-n', this)"><i class="bi bi-plus-lg fs-5"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-e', this)"><i class="bi bi-journal-text fs-5"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-p', this)"><i class="bi bi-shield-lock fs-5"></i></div>
    </div>

    <div class="container">
        <div id="aba-n" class="aba-content active">
            <div class="card-p">
                <div class="btn-group w-100 mb-3" style="border: 1px solid var(--border); border-radius: 10px; overflow: hidden;">
                    <input type="radio" class="btn-check" name="tp" id="tE" value="Entrada" checked onchange="ajustarBotaoMain()">
                    <label class="btn btn-outline-success border-0 py-2" for="tE">Entrada</label>
                    <input type="radio" class="btn-check" name="tp" id="tS" value="Saída" onchange="ajustarBotaoMain()">
                    <label class="btn btn-outline-danger border-0 py-2" for="tS">Saída</label>
                </div>
                <input type="text" id="desc" class="form-control" placeholder="Descrição (Ex: Salário)">
                <input type="number" id="val" class="form-control" placeholder="Valor R$" oninput="ajustarBotaoMain()">
                <div id="contComent" style="display:none;"><input type="text" id="coment" class="form-control" placeholder="⚠️ Comentário (Opcional)"></div>
                <button id="btnPrincipal" onclick="add()" class="btn-m btn-verde btn-active">Registrar Entrada</button>
            </div>

            <div class="card-p">
                <h6 class="text-uppercase fw-bold mb-3" style="font-size: 0.7rem; color: var(--accent); letter-spacing: 1px;">
                    <i class="bi bi-bar-chart-fill me-2"></i>Previsão Próximos 3 Meses
                </h6>
                <div style="height: 160px;"><canvas id="graficoPrevisao"></canvas></div>
                <div class="mt-3 text-center small fw-bold"><span id="analiseTexto" class="text-muted">Análise: Calcule os valores</span></div>
            </div>
        </div>

        <div id="aba-e" class="aba-content"><div id="list"></div></div>

        <div id="aba-p" class="aba-content">
            <div class="card-p text-center mb-3">
                <div class="mb-2"><i class="bi bi-safe2 text-success" style="font-size: 3rem;"></i></div>
                <h2 class="fw-bold mb-4" id="totalCofre">R$ 0,00</h2>
                <input type="number" id="valP" class="form-control text-center" placeholder="Valor R$" oninput="validarBotoesCofre()">
                <input type="text" id="comentCofre" class="form-control text-center" placeholder="⚠️ Motivo (Opcional)">
                <div class="d-flex gap-2 mb-3">
                    <button id="btnDep" onclick="poup('add')" class="btn-m btn-verde">Depositar</button>
                    <button id="btnRes" onclick="poup('sub')" class="btn-outline-danger-pro">Resgatar</button>
                </div>
            </div>
            <h6 class="text-uppercase fw-bold text-muted mb-2 ms-2" style="font-size: 0.7rem;">Histórico</h6>
            <div id="listCofre"></div>
        </div>
    </div>

    <script>
        // MANTER A CHAVE DE VERSÃO (v5)
        let dados = JSON.parse(localStorage.getItem('fin_v_pro_v5')) || { transacoes: [], cofre: 0, histCofre: [] };
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const selMes = document.getElementById('mes');
        meses.forEach((m, i) => { const opt = document.createElement('option'); opt.value = m; opt.text = m; if(i === new Date().getMonth()) opt.selected = true; selMes.add(opt); });

        let chart = null;

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        function trocarAba(id, el) { document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active')); document.querySelectorAll('.nav-item-custom').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); renderizar(); }
        
        // CORREÇÃO: Lógica e visual do botão principal
        function ajustarBotaoMain() { 
            const t = document.querySelector('input[name="tp"]:checked').value; 
            const v = parseFloat(document.getElementById('val').value) || 0;
            document.getElementById('contComent').style.display = t === "Saída" ? "block" : "none"; 
            const b = document.getElementById('btnPrincipal'); 
            b.className = t === "Saída" ? "btn-m btn-vermelho" : "btn-m btn-verde"; 
            b.innerText = t === "Saída" ? "Registrar Gasto" : "Registrar Entrada"; 
            if(v > 0) b.classList.add('btn-active'); else b.classList.remove('btn-active');
        }

        // CORREÇÃO: Lógica e visual dos botões do cofre
        function validarBotoesCofre() {
            const v = parseFloat(document.getElementById('valP').value) || 0;
            const bD = document.getElementById('btnDep');
            const bR = document.getElementById('btnRes');
            if(v > 0) { bD.classList.add('btn-active'); bR.classList.add('btn-active'); }
            else { bD.classList.remove('btn-active'); bR.classList.remove('btn-active'); }
        }

        function add() {
            const d = document.getElementById('desc').value, v = parseFloat(document.getElementById('val').value) || 0, t = document.querySelector('input[name="tp"]:checked').value, c = document.getElementById('coment').value;
            if (!d || v <= 0) return showToast("⚠️ Preencha os campos!");
            dados.transacoes.push({ id: Date.now(), mes: selMes.value, d, v, tp: t, coment: t === "Saída" ? c : "" });
            salvar(); document.getElementById('desc').value = ""; document.getElementById('val').value = ""; document.getElementById('coment').value = "";
            ajustarBotaoMain(); showToast("Registrado! 🛠️");
        }

        function poup(tipo) {
            const v = parseFloat(document.getElementById('valP').value) || 0, c = document.getElementById('comentCofre').value;
            if (v <= 0) return;
            dados.histCofre.unshift({ id: Date.now(), v, tipo, coment: c, data: new Date().toLocaleDateString() });
            document.getElementById('valP').value = ""; document.getElementById('comentCofre').value = "";
            validarBotoesCofre(); salvar(); showToast("Cofre atualizado!");
        }

        let idApagar = null, tipoApagar = '';
        function abrirModal(id, tipo) { idApagar = id; tipoApagar = tipo; document.getElementById('modalConfirm').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalConfirm').style.display = 'none'; }
        document.getElementById('btnConfirmarDelete').onclick = function() {
            if(tipoApagar === 't') dados.transacoes = dados.transacoes.filter(x => x.id !== idApagar); else dados.histCofre = dados.histCofre.filter(x => x.id !== idApagar);
            salvar(); fecharModal();
        };

        function salvar() { localStorage.setItem('fin_v_pro_v5', JSON.stringify(dados)); renderizar(); }

        function renderizar() {
            const list = document.getElementById('list'), listC = document.getElementById('listCofre');
            list.innerHTML = ""; listC.innerHTML = "";
            let entM = 0, saiM = 0, salC = 0;

            dados.transacoes.filter(t => t.mes === selMes.value).forEach(t => {
                const isE = t.tp === "Entrada"; if(isE) entM += t.v; else saiM += t.v;
                if(document.getElementById('aba-e').classList.contains('active')) {
                    list.innerHTML += `<div class="card-p mb-2" style="border-left: 4px solid ${isE ? 'var(--in)' : 'var(--out)'}; padding: 12px; background-color: #1a1a1a;"><div class="d-flex justify-content-between align-items-center"><div onclick="abrirModal(${t.id}, 't')"><b>${t.d}</b></div><div class="${isE ? 'text-success' : 'text-danger'} fw-bold">${isE ? '+' : '-'}${t.v.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'})}</div></div>${t.coment ? `<div class="comentario-box">⚠️ ${t.coment}</div>` : ''}</div>`;
                }
            });

            dados.histCofre.forEach(x => {
                const isA = x.tipo === 'add'; if(isA) salC += x.v; else salC -= x.v;
                if(document.getElementById('aba-p').classList.contains('active')) {
                    listC.innerHTML += `<div class="card-p mb-2 py-2" style="border-left: 3px solid ${isA ? 'var(--in)' : 'var(--out)'}; opacity: 0.8; background-color: #1a1a1a;"><div class="d-flex justify-content-between"><span><i class="bi bi-trash3 me-2 opacity-50" onclick="abrirModal(${x.id}, 'h')"></i><small class="text-muted">${x.data}</small></span><span class="${isA ? 'text-success' : 'text-danger'} fw-bold">R$ ${x.v.toFixed(2)}</span></div>${x.coment ? `<div class="comentario-box">⚠️ ${x.coment}</div>` : ''}</div>`;
                }
            });

            document.getElementById('resumoEntradas').innerText = entM.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
            document.getElementById('resumoSaidas').innerText = saiM.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
            document.getElementById('resumoSaldo').innerText = (entM - saiM).toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
            document.getElementById('totalCofre').innerText = salC.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
            
            // CORREÇÃO: Gráfico dinâmico baseado no mês selecionado
            atualizarGraficoProjetado(entM, saiM);
        }

        // CORREÇÃO: Lógica do gráfico para projetar apenas o mês selecionado
        function atualizarGraficoProjetado(entM, saiM) {
            const ctx = document.getElementById('graficoPrevisao').getContext('2d');
            const mIdx = meses.indexOf(selMes.value);
            const lbls = [meses[mIdx], meses[(mIdx+1)%12], meses[(mIdx+2)%12]];
            
            // Dados projetados: Mês Atual é real, os outros são cópia (projeção básica)
            // Se não houver dados no mês atual, as barras ficam zeradas
            const dadosEntradas = [entM, entM, entM]; 
            const dadosSaidas = [saiM, saiM, saiM];

            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lbls,
                    datasets: [
                        { label: 'Ganho', data: dadosEntradas, backgroundColor: '#2ecc71', borderRadius: 5, borderSkipped: false },
                        { label: 'Gasto', data: dadosSaidas, backgroundColor: '#e74c3c', borderRadius: 5, borderSkipped: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, grid: { display: false } }, x: { ticks: { color: '#888', font: { size: 10 } }, grid: { display: false } } } }
            });

            const p = entM > 0 ? ((saiM/entM)*100).toFixed(0) : 0;
            const el = document.getElementById('analiseTexto');
            el.innerText = `Análise: ${p}% da renda comprometida`;
            if(entM === 0 && saiM === 0) { el.className = "text-muted"; el.innerText = "Análise: Lance valores para calcular"; }
            else { el.className = p > 80 ? 'text-danger fw-bold' : 'text-success fw-bold'; }
        }

        renderizar();
        ajustarBotaoMain();
        validarBotoesCofre();
    </script>
</body>
</html>
