<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Pro 🛠️</title>
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Finanças">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=3"> <meta name="theme-color" content="#2ecc71">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { 
            --accent: #2ecc71; /* VERDE FINANCEIRO */
            --bg: #121212; 
            --card: #1e1e1e; 
            --in: #2ecc71; 
            --out: #e74c3c; 
            --text-muted: #aaaaaa; 
        }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        /* HEADER COM SELETOR DE MÊS FIXO */
        .premium-header { 
            background: linear-gradient(135deg, #0f0c29, #1b3a1b); 
            padding: 40px 20px 60px; border-radius: 0 0 30px 30px; text-align: center; 
        }
        .h-label { background: rgba(255, 255, 255, 0.08); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); flex: 1; }
        
        /* NAVEGAÇÃO PRO */
        .nav-custom { background: #252525; border-radius: 12px; display: flex; padding: 5px; margin: -30px 15px 20px; position: relative; z-index: 20; }
        .nav-item-custom { flex: 1; text-align: center; padding: 10px; color: #888; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .nav-item-custom.active { background: var(--accent); color: #000; font-weight: bold; }

        .aba-content { display: none; }
        .aba-content.active { display: block; }

        /* CARDS E INPUTS PRO */
        .card-p { background: var(--card); border: 1px solid #444; border-radius: 16px; margin-bottom: 15px; padding: 20px; }
        .form-control, .form-select { background: #252525; border: 1px solid #555; color: #fff; margin-bottom: 12px; }
        .form-control::placeholder { color: #888 !important; opacity: 1; }
        
        /* BOTÕES PRO */
        .btn-m { border: none; border-radius: 12px; padding: 14px; font-weight: 800; width: 100%; text-transform: uppercase; transition: 0.3s; opacity: 0.4; color: #000; }
        .btn-active { opacity: 1 !important; cursor: pointer; }
        .btn-verde { background-color: var(--in); color: #000; }
        .btn-vermelho { background-color: var(--out); color: #fff; }
        
        .text-muted-custom { color: var(--text-muted) !important; font-size: 0.85rem; }
        
        /* TOAST E MODAL PRO */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 50px; border: 1px solid var(--accent); z-index: 9999; display: none; font-weight: bold; }
        #modalConfirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-box { background: #1e1e1e; padding: 25px; border-radius: 20px; text-align: center; width: 85%; border: 1px solid #444; }
        
        /* ESTILO COMENTÁRIO MASCULINO */
        .comentario-box { color: #ffffff; font-size: 0.9rem; margin-top: 8px; font-weight: 400; opacity: 0.9; }
        .comentario-icon { color: #f1c40f; margin-right: 5px; }

        /* NOVO: Seletor de Mês Fixo no Topo */
        .month-selector-top { max-width: 150px; margin: 0 auto; background: rgba(255, 255, 255, 0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; font-weight: bold; border-radius: 50px; text-align-last: center; }
    </style>
</head>
<body class="pb-5">

    <div id="toast"></div>

    <div id="modalConfirm">
        <div class="modal-box">
            <h5 class="mb-3">Deseja apagar este registro? 🗑️</h5>
            <div class="d-flex gap-2">
                <button onclick="fecharModal()" class="btn btn-secondary w-100 rounded-pill">Cancelar</button>
                <button id="btnConfirmarDelete" class="btn btn-danger w-100 rounded-pill">Apagar</button>
            </div>
        </div>
    </div>

    <div class="premium-header">
        <select id="mes" class="form-select month-selector-top mb-3" onchange="renderizar()"></select>

        <small class="text-uppercase" style="opacity: 0.6; letter-spacing: 1px;">Saldo</small>
        <h1 class="display-4 fw-bold mb-3" id="resumoSaldo">R$ 0,00</h1>
        
        <div class="d-flex gap-2 mt-3">
            <div class="h-label"><i class="bi bi-graph-up text-success"></i> <span id="resumoEntradas">R$ 0,00</span></div>
            <div class="h-label"><i class="bi bi-graph-down text-danger"></i> <span id="resumoSaidas">R$ 0,00</span></div>
        </div>
    </div>

    <div class="nav-custom shadow-sm">
        <div class="nav-item-custom active" onclick="trocarAba('aba-n', this)"><i class="bi bi-plus-lg fs-5"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-e', this)"><i class="bi bi-journal-text fs-5"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-p', this)"><i class="bi bi-shield-lock fs-5"></i></div>
    </div>

    <div class="container">
        <div id="aba-n" class="aba-content active">
            <div class="card-p">
                <div class="btn-group w-100 mb-3">
                    <input type="radio" class="btn-check" name="tp" id="tE" value="Entrada" checked onchange="ajustarBotaoPrincipal()">
                    <label class="btn btn-outline-success border-2" for="tE">Entrada</label>
                    <input type="radio" class="btn-check" name="tp" id="tS" value="Saída" onchange="ajustarBotaoPrincipal()">
                    <label class="btn btn-outline-danger border-2" for="tS">Saída</label>
                </div>
                <input type="text" id="desc" class="form-control" placeholder="Descrição (Ex: Salário)">
                <input type="number" id="val" class="form-control" placeholder="Valor" oninput="ajustarBotaoPrincipal()">
                
                <div id="containerComentario" style="display:none;">
                    <input type="text" id="comentario" class="form-control" placeholder="⚠️ Comentário (Opcional)">
                </div>

                <button id="btnPrincipal" onclick="add()" class="btn-m btn-verde btn-active">Registrar Entrada</button>
            </div>
        </div>

        <div id="aba-e" class="aba-content"><div id="list"></div></div>

        <div id="aba-p" class="aba-content">
            <div class="card-p text-center mb-3">
                <i class="bi bi-safe2 text-success display-5 mb-2"></i>
                <h2 class="fw-bold mb-4" id="totalCofre">R$ 0,00</h2>
                <input type="number" id="valP" class="form-control text-center" placeholder="Valor" oninput="validarBotoesCofre()">
                <input type="text" id="comentarioCofre" class="form-control text-center border-0" placeholder="⚠️ Motivo (Opcional)">
                <div class="d-flex gap-2 mb-4">
                    <button id="btnDep" onclick="poup('add')" class="btn-m btn-verde">Depositar</button>
                    <button id="btnRes" onclick="poup('sub')" class="btn btn-outline-danger w-100 border-2" style="border-radius:12px">Resgatar</button>
                </div>
            </div>
            <h6 class="text-muted ms-3 mb-2 text-uppercase" style="font-size: 0.7rem;">Histórico do Cofre</h6>
            <div id="listCofre"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // REFORÇO DE SERVICE WORKER PARA ATUALIZAÇÃO NO IPHONE
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js?v=3').then(function(reg) { reg.update(); }); }

        // MUDANÇA DA CHAVE DE VERSÃO (FORÇA O IPHONE A ATUALIZAR)
        let dados = JSON.parse(localStorage.getItem('fin_v_ios_vfinal_premium_masc_3')) || { transacoes: [], cofre: 0, histCofre: [] };

        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const selMes = document.getElementById('mes');
        meses.forEach((m, idx) => { const opt = document.createElement('option'); opt.value = m; opt.text = m; if(idx === new Date().getMonth()) opt.selected = true; selMes.add(opt); });

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        function trocarAba(id, el) { document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active')); document.querySelectorAll('.nav-item-custom').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); renderizar(); }
        function fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function ajustarBotaoPrincipal() {
            const btn = document.getElementById('btnPrincipal');
            const tipo = document.querySelector('input[name="tp"]:checked').value;
            const val = document.getElementById('val').value;
            document.getElementById('containerComentario').style.display = (tipo === "Saída") ? "block" : "none";
            btn.className = (tipo === "Saída") ? "btn-m btn-vermelho btn-active" : "btn-m btn-verde btn-active";
            btn.innerText = (tipo === "Saída") ? "Registrar Gasto" : "Registrar Entrada";
        }

        function validarBotoesCofre() {
            const val = document.getElementById('valP').value;
            const bD = document.getElementById('btnDep');
            const bR = document.getElementById('btnRes');
            if (val > 0) { bD.classList.add('btn-active'); bR.style.backgroundColor = "var(--out)"; bR.style.color = "#fff"; }
            else { bD.classList.remove('btn-active'); bR.style.backgroundColor = "transparent"; bR.style.color = "var(--out)"; }
        }

        function add() {
            const desc = document.getElementById('desc').value, val = parseFloat(document.getElementById('val').value) || 0, tipo = document.querySelector('input[name="tp"]:checked').value, coment = document.getElementById('comentario').value;
            if (!desc || val <= 0) return showToast("⚠️ Preencha os campos!");
            dados.transacoes.push({ id: Date.now(), mes: selMes.value, d: desc, v: val, tp: tipo, coment: tipo === "Saída" ? coment : "" });
            salvar(); document.getElementById('desc').value = ""; document.getElementById('val').value = ""; document.getElementById('comentario').value = "";
            showToast("Lançado! ✨");
        }

        function poup(tipo) {
            const v = parseFloat(document.getElementById('valP').value) || 0, c = document.getElementById('comentarioCofre').value;
            if (v <= 0) return;
            dados.cofre = (tipo === 'add') ? dados.cofre + v : dados.cofre - v;
            dados.histCofre.unshift({ id: Date.now(), v, tipo, coment: c, data: new Date().toLocaleDateString() });
            document.getElementById('valP').value = ""; document.getElementById('comentarioCofre').value = "";
            validarBotoesCofre(); salvar(); showToast("Cofre atualizado! 💎");
        }

        let idApagar = null, tipoApagar = '';
        function abrirModal(id, tipo) { idApagar = id; tipoApagar = tipo; document.getElementById('modalConfirm').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalConfirm').style.display = 'none'; }
        document.getElementById('btnConfirmarDelete').onclick = function() {
            if(tipoApagar === 't') dados.transacoes = dados.transacoes.filter(x => x.id !== idApagar); else dados.histCofre = dados.histCofre.filter(x => x.id !== idApagar);
            salvar(); fecharModal(); showToast("Removido! 🗑️");
        };

        function salvar() { localStorage.setItem('fin_v_ios_vfinal_premium_masc_3', JSON.stringify(dados)); renderizar(); }

        function renderizar() {
            const listaExtrato = document.getElementById('list'); listaExtrato.innerHTML = "";
            const listHCofre = document.getElementById('listCofre'); listHCofre.innerHTML = "";
            let entM = 0, saiM = 0, saldoCofre = 0;

            // Renderizar Transações Mensais
            const itensM = dados.transacoes.filter(t => t.mes === selMes.value);
            if(itensM.length === 0) listaExtrato.innerHTML = '<div class="text-center py-5 opacity-50">Nenhum registro 🛠️</div>';
            itensM.forEach((t) => {
                const isE = t.tp === "Entrada"; if(isE) entM += t.v; else saiM += t.v;
                listaExtrato.innerHTML += `<div class="card-p mb-2" style="border-left: 5px solid ${isE ? 'var(--in)' : 'var(--out)'}; padding: 12px;"><div class="d-flex justify-content-between align-items-center"><div onclick="abrirModal(${t.id}, 't')"><i class="bi bi-trash3 text-muted me-2"></i><b>${t.d}</b></div><div class="${isE ? 'text-success' : 'text-danger'} fw-bold">${isE ? '+' : '-'}${fmt(t.v)}</div></div>${t.coment ? `<div class="comentario-box"><i class="bi bi-exclamation-triangle-fill comentario-icon"></i>${t.coment}</div>` : ''}</div>`;
            });

            // CORREÇÃO: Renderizar e Recalcular Saldo do Cofre Masculino
            if(dados.histCofre.length === 0) listHCofre.innerHTML = '<div class="text-center text-muted opacity-50 py-3 small">Cofre vazio 💎</div>';
            dados.histCofre.forEach(x => {
                const isAdd = x.tipo === 'add';
                if(isAdd) saldoCofre += x.v; else saldoCofre -= x.v; // Recalcula o saldo

                listHCofre.innerHTML += `<div class="card-p mb-2 py-2 px-3" style="border-left: 3px solid ${isAdd ? 'var(--in)' : 'var(--out)'}; opacity: 0.8;"><div class="d-flex justify-content-between align-items-center"><span><i class="bi bi-trash3 me-2 opacity-50" onclick="abrirModal(${x.id}, 'h')"></i><small>${x.data}</small></span><span class="${isAdd ? 'text-success' : 'text-danger'} fw-bold">${isAdd ? '+' : '-'}${fmt(x.v)}</span></div>${x.coment ? `<div class="comentario-box"><i class="bi bi-exclamation-triangle-fill comentario-icon"></i>${x.coment}</div>` : ''}</div>`;
            });

            // Atualizar os Resumos na Tela
            document.getElementById('resumoEntradas').innerText = fmt(entM);
            document.getElementById('resumoSaidas').innerText = fmt(saiM);
            document.getElementById('resumoSaldo').innerText = fmt(entM - saiM);
            
            // CORREÇÃO: Atualiza o Saldo do Cofre com o valor recalculado
            document.getElementById('totalCofre').innerText = fmt(saldoCofre); 
            dados.cofre = saldoCofre; // Sincroniza o valor recalculado
        }
        renderizar();
        ajustarBotaoPrincipal();
    </script>
</body>
</html>
