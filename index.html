<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Pro 🛠️</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --accent: #2ecc71; --bg: #121212; --card: #1e1e1e; --in: #2ecc71; --out: #e74c3c; --text-muted: #aaaaaa; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        .premium-header { background: linear-gradient(135deg, #0f0c29, #1b3a1b); padding: 40px 20px 60px; border-radius: 0 0 30px 30px; text-align: center; }
        .h-label { background: rgba(255, 255, 255, 0.08); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); flex: 1; }
        
        .nav-custom { background: #252525; border-radius: 12px; display: flex; padding: 5px; margin: -30px 15px 20px; position: relative; z-index: 20; }
        .nav-item-custom { flex: 1; text-align: center; padding: 10px; color: #888; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .nav-item-custom.active { background: var(--accent); color: #000; font-weight: bold; }
        
        .aba-content { display: none; }
        .aba-content.active { display: block; }
        
        .card-p { background: var(--card); border: 1px solid #444; border-radius: 16px; margin-bottom: 15px; padding: 20px; }
        
        /* Ajuste de visibilidade dos inputs e placeholders */
        .form-control, .form-select { background: #252525; border: 1px solid #555; color: #fff; margin-bottom: 12px; }
        .form-control::placeholder { color: #888 !important; opacity: 1; }
        
        /* Botões do Cofre e Lançamento */
        .btn-m { border: none; border-radius: 12px; padding: 14px; font-weight: 800; width: 100%; text-transform: uppercase; transition: 0.3s; opacity: 0.4; }
        .btn-active { opacity: 1 !important; cursor: pointer; }
        
        .btn-verde { background-color: var(--in); color: #000; }
        .btn-vermelho { background-color: var(--out); color: #fff; }
        
        .text-muted-custom { color: var(--text-muted) !important; font-size: 0.85rem; }
        
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 50px; border: 1px solid var(--accent); z-index: 9999; display: none; font-weight: bold; }
        
        #modalConfirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: #1e1e1e; padding: 25px; border-radius: 20px; text-align: center; width: 85%; border: 1px solid #444; }
        
        /* Estilo Comentário conforme o print */
        .comentario-box { color: #ffffff; font-size: 0.9rem; margin-top: 8px; font-weight: 400; opacity: 0.9; }
        .comentario-icon { color: #f1c40f; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="modalConfirm">
        <div class="modal-box">
            <h5 class="mb-3">Deseja apagar este registro?</h5>
            <div class="d-flex gap-2">
                <button onclick="fecharModal()" class="btn btn-secondary w-100 rounded-pill">Cancelar</button>
                <button id="btnConfirmarDelete" class="btn btn-danger w-100 rounded-pill">Apagar</button>
            </div>
        </div>
    </div>

    <div class="premium-header">
        <small class="text-uppercase" style="opacity: 0.6; letter-spacing: 1px;">Saldo</small>
        <h1 class="display-4 fw-bold" id="resSaldo">R$ 0,00</h1>
        <div class="d-flex gap-2 mt-3">
            <div class="h-label"><i class="bi bi-graph-up text-success"></i> <span id="resEnt">R$ 0,00</span></div>
            <div class="h-label"><i class="bi bi-graph-down text-danger"></i> <span id="resSai">R$ 0,00</span></div>
        </div>
    </div>

    <div class="nav-custom">
        <div class="nav-item-custom active" onclick="trocarAba('aba-n', this)"><i class="bi bi-plus-lg"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-e', this)"><i class="bi bi-activity"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-p', this)"><i class="bi bi-shield-lock"></i></div>
    </div>

    <div class="container">
        <div id="aba-n" class="aba-content active">
            <div class="card-p">
                <select id="mes" class="form-select" onchange="renderizar()"></select>
                <div class="btn-group w-100 mb-3">
                    <input type="radio" class="btn-check" name="tp" id="tE" value="Entrada" checked onchange="ajustarBotaoPrincipal()">
                    <label class="btn btn-outline-success" for="tE">Entrada</label>
                    <input type="radio" class="btn-check" name="tp" id="tS" value="Saída" onchange="ajustarBotaoPrincipal()">
                    <label class="btn btn-outline-danger" for="tS">Saída</label>
                </div>
                <input type="text" id="desc" class="form-control" placeholder="Descrição">
                <input type="number" id="val" class="form-control" placeholder="Valor" oninput="ajustarBotaoPrincipal()">
                <div id="containerComentario" style="display:none;">
                    <input type="text" id="comentario" class="form-control" placeholder="⚠ Comentário (Ex: Retirada para pagar dívidas)">
                </div>
                <button id="btnPrincipal" onclick="add()" class="btn-m btn-verde">Registrar Entrada</button>
            </div>
        </div>

        <div id="aba-e" class="aba-content"><div id="list"></div></div>

        <div id="aba-p" class="aba-content">
            <div class="card-p text-center mb-3">
                <i class="bi bi-safe2 text-success display-5 mb-2"></i>
                <h2 class="fw-bold mb-4" id="resCofre">R$ 0,00</h2>
                <input type="number" id="valP" class="form-control text-center" placeholder="Valor" oninput="validarBotoesCofre()">
                <div class="d-flex gap-2">
                    <button id="btnDep" onclick="poup('add')" class="btn-m btn-verde">Depositar</button>
                    <button id="btnRes" onclick="poup('sub')" class="btn-m btn-vermelho" style="background-color: transparent; border: 1px solid var(--out); color: var(--out);">Resgatar</button>
                </div>
            </div>
            <h6 class="text-white ms-2 mb-2 text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px; opacity: 0.8;">Histórico do Cofre</h6>
            <div id="listCofre" style="font-size: 0.85rem;"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fin_v_final_v10')) || { t: [], c: 0, hc: [] };
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const sel = document.getElementById('mes');
        meses.forEach(m => sel.innerHTML += `<option ${m === meses[new Date().getMonth()] ? 'selected' : ''}>${m}</option>`);

        function ajustarBotaoPrincipal() {
            const btn = document.getElementById('btnPrincipal');
            const val = document.getElementById('val').value;
            const tipo = document.querySelector('input[name="tp"]:checked').value;
            const contComent = document.getElementById('containerComentario');
            
            contComent.style.display = (tipo === "Saída") ? "block" : "none";
            
            if (val > 0) btn.classList.add('btn-active'); else btn.classList.remove('btn-active');
            
            if (tipo === "Saída") {
                btn.className = val > 0 ? "btn-m btn-vermelho btn-active" : "btn-m btn-vermelho";
                btn.innerText = "Registrar Saída";
            } else {
                btn.className = val > 0 ? "btn-m btn-verde btn-active" : "btn-m btn-verde";
                btn.innerText = "Registrar Entrada";
            }
        }

        function validarBotoesCofre() {
            const val = document.getElementById('valP').value;
            const bD = document.getElementById('btnDep');
            const bR = document.getElementById('btnRes');
            if (val > 0) {
                bD.classList.add('btn-active');
                bR.classList.add('btn-active');
                bR.style.backgroundColor = "var(--out)";
                bR.style.color = "#fff";
            } else {
                bD.classList.remove('btn-active');
                bR.classList.remove('btn-active');
                bR.style.backgroundColor = "transparent";
                bR.style.color = "var(--out)";
            }
        }

        function trocarAba(id, el) {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.nav-item-custom').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            renderizar();
        }

        function fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function add() {
            const d = document.getElementById('desc').value, v = parseFloat(document.getElementById('val').value);
            const tipo = document.querySelector('input[name="tp"]:checked').value;
            const coment = document.getElementById('comentario').value;
            if (!d || !v) return;
            db.t.push({ id: Date.now(), m: sel.value, d, v, tp: tipo, coment: tipo === "Saída" ? coment : "" });
            save();
            document.getElementById('desc').value = ""; document.getElementById('val').value = ""; document.getElementById('comentario').value = "";
            ajustarBotaoPrincipal();
        }

        function poup(tipo) {
            const v = parseFloat(document.getElementById('valP').value) || 0;
            if (v <= 0) return;
            const agora = new Date();
            const dataFmt = `${agora.getDate()}/${agora.getMonth()+1}/${agora.getFullYear()}`;
            db.c = (tipo === 'add') ? db.c + v : db.c - v;
            db.hc.unshift({ id: Date.now(), v, tipo, data: dataFmt });
            document.getElementById('valP').value = "";
            validarBotoesCofre();
            save();
        }

        function save() { localStorage.setItem('fin_v_final_v10', JSON.stringify(db)); renderizar(); }

        function renderizar() {
            const list = document.getElementById('list');
            list.innerHTML = ""; let ent = 0, sai = 0;
            db.t.filter(x => x.m === sel.value).forEach(x => {
                const isE = x.tp === "Entrada";
                if(isE) ent += x.v; else sai += x.v;
                list.innerHTML += `
                    <div class="card-p mb-2" style="border-left: 5px solid ${isE ? 'var(--in)' : 'var(--out)'};">
                        <div class="d-flex justify-content-between align-items-center">
                            <div onclick="abrirModal(${x.id}, 't')">
                                <small class="text-muted d-block" style="font-size: 0.7rem;">${x.m}</small>
                                <b>${x.d}</b>
                            </div>
                            <div class="${isE ? 'text-success' : 'text-danger'} fw-bold">${isE ? '+' : '-'}${fmt(x.v)}</div>
                        </div>
                        ${!isE && x.coment ? `<div class="comentario-box"><i class="bi bi-exclamation-triangle-fill comentario-icon"></i>${x.coment}</div>` : ''}
                    </div>`;
            });

            const listC = document.getElementById('listCofre');
            listC.innerHTML = "";
            db.hc.forEach(x => {
                const isAdd = x.tipo === 'add';
                listC.innerHTML += `<div class="card-p mb-2 py-2 px-3" style="border-left: 3px solid ${isAdd ? 'var(--in)' : 'var(--out)'}; opacity: 0.8;">
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-white" style="opacity: 0.6;">${x.data} <i class="bi bi-trash3 ms-2" onclick="abrirModal(${x.id}, 'hc')"></i></small>
                        <span class="${isAdd ? 'text-success' : 'text-danger'} fw-bold">${isAdd ? '+' : '-'}${fmt(x.v)}</span>
                    </div></div>`;
            });

            document.getElementById('resEnt').innerText = fmt(ent);
            document.getElementById('resSai').innerText = fmt(sai);
            document.getElementById('resSaldo').innerText = fmt(ent - sai);
            document.getElementById('resCofre').innerText = fmt(db.c);
        }

        let idApagar = null, tipoApagar = '';
        function abrirModal(id, tipo) { idApagar = id; tipoApagar = tipo; document.getElementById('modalConfirm').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalConfirm').style.display = 'none'; }
        document.getElementById('btnConfirmarDelete').onclick = function() {
            if(tipoApagar === 't') db.t = db.t.filter(x => x.id !== idApagar);
            else db.hc = db.hc.filter(x => x.id !== idApagar);
            save(); fecharModal();
        };

        renderizar();
    </script>
</body>
</html>
