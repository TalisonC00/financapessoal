<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Premium R$</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #00b894;
            --secondary-color: #0984e3;
            --bg-body: #f8f9fa;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.05);
        }

        body { background-color: var(--bg-body); font-family: 'Inter', sans-serif; color: #2d3436; }
        
        .premium-header {
            background: linear-gradient(135deg, #1e3799, #00b894);
            color: white; padding: 40px 20px;
            border-radius: 0 0 30px 30px; margin-bottom: -40px;
        }

        .card-premium {
            background: white; border: none; border-radius: 20px;
            box-shadow: var(--card-shadow); transition: transform 0.2s;
            margin-bottom: 20px; overflow: hidden;
        }

        .nav-pills { background: #eee; border-radius: 50px; padding: 5px; }
        .nav-link { border-radius: 50px !important; color: #636e72; font-weight: 600; }
        .nav-link.active { background-color: var(--primary-color) !important; box-shadow: 0 4px 10px rgba(0,184,148,0.3); }

        .btn-action {
            border-radius: 15px; padding: 15px; font-weight: 700;
            border: none; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-deposit { background: var(--primary-color); color: white; }
        .btn-withdraw { background: #fab1a0; color: #d63031; }

        .tag-categoria {
            font-size: 0.7rem; padding: 4px 10px;
            border-radius: 20px; font-weight: bold; text-transform: uppercase;
        }

        .progress { height: 8px; border-radius: 10px; background-color: #dfe6e9; }
        .progress-bar { background-color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="premium-header text-center">
        <small style="opacity: 0.8;">Balanço Total Disponível</small>
        <h1 class="display-5 fw-bold" id="resumoSaldo">R$ 0,00</h1>
    </div>

    <div class="container position-relative" style="z-index: 10;">
        <div class="card card-premium p-3 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small fw-bold text-muted">Gastos do Mês</span>
                <span class="small fw-bold" id="percentualGasto">0%</span>
            </div>
            <div class="progress mb-3">
                <div id="barraProgresso" class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            <div class="d-flex justify-content-around border-top pt-3">
                <div class="text-center">
                    <i class="bi bi-safe2 text-primary fs-4"></i><br>
                    <small class="text-muted d-block">No Cofre</small>
                    <strong id="resumoPoupanca">R$ 0,00</strong>
                </div>
            </div>
        </div>

        <ul class="nav nav-pills nav-fill mb-4 shadow-sm" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#aba-gastos">Extrato</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-poupanca">Cofre</button></li>
        </ul>

        <div class="tab-content pb-5">
            <div class="tab-pane fade show active" id="aba-gastos">
                <div class="card card-premium p-4">
                    <div class="row g-2 mb-3">
                        <div class="col-12">
                            <select id="mes" class="form-select border-0 bg-light" onchange="renderizar()">
                                <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
                                <option>Abril</option><option>Maio</option><option>Junho</option>
                                <option>Julho</option><option>Agosto</option><option>Setembro</option>
                                <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
                            </select>
                        </div>
                        <div class="col-12"><input type="number" id="rendimento" class="form-control border-0 bg-light" placeholder="Rendimento R$"></div>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <input type="text" id="desc" class="form-control mb-2 border-0 bg-light" placeholder="Descrição do gasto">
                        <div class="d-flex gap-2 mb-3">
                            <input type="number" id="valor" class="form-control border-0 bg-light" placeholder="Valor R$">
                            <select id="categoria" class="form-select border-0 bg-light w-50">
                                <option value="Fixo">Fixo</option>
                                <option value="Lazer">Lazer</option>
                                <option value="Saúde">Saúde</option>
                                <option value="Mercado">Mercado</option>
                            </select>
                        </div>
                        <button onclick="adicionarGasto()" class="btn btn-action btn-deposit w-100">Adicionar Transação</button>
                    </div>
                </div>

                <div id="listaDespesas"></div>
            </div>

            <div class="tab-pane fade" id="aba-poupanca">
                <div class="card card-premium p-4 text-center">
                    <div class="mb-3"><i class="bi bi-shield-check text-primary" style="font-size: 3rem;"></i></div>
                    <h5 class="text-muted">Reserva de Emergência</h5>
                    <h2 class="fw-bold mb-4" id="totalCofre">R$ 0,00</h2>
                    
                    <input type="number" id="valorPoupanca" class="form-control form-control-lg mb-3 border-0 bg-light text-center" placeholder="Valor R$">
                    <div class="d-flex gap-3">
                        <button onclick="gerirPoupanca('add')" class="btn btn-action btn-deposit w-100">Poupar</button>
                        <button onclick="gerirPoupanca('sub')" class="btn btn-action btn-withdraw w-100">Resgatar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center">
            <button onclick="limparTudo()" class="btn btn-sm text-muted opacity-50">Resetar Aplicativo</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let dados = JSON.parse(localStorage.getItem('financas_premium')) || { gastos: [], cofre: 0 };

        const cores = { Fixo: '#6c5ce7', Lazer: '#fdcb6e', Saúde: '#d63031', Mercado: '#00b894' };

        function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function adicionarGasto() {
            const mes = document.getElementById('mes').value;
            const rend = parseFloat(document.getElementById('rendimento').value) || 0;
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('valor').value) || 0;
            const cat = document.getElementById('categoria').value;

            if (!desc || valor <= 0) return;

            dados.gastos.push({ mes, rend, desc, valor, cat });
            salvar();
            document.getElementById('desc').value = ""; document.getElementById('valor').value = "";
        }

        function gerirPoupanca(tipo) {
            const v = parseFloat(document.getElementById('valorPoupanca').value) || 0;
            if (v <= 0) return;
            dados.cofre = (tipo === 'add') ? dados.cofre + v : dados.cofre - v;
            document.getElementById('valorPoupanca').value = "";
            salvar();
        }

        function salvar() {
            localStorage.setItem('financas_premium', JSON.stringify(dados));
            renderizar();
        }

        function renderizar() {
            const mesAtual = document.getElementById('mes').value;
            const lista = document.getElementById('listaDespesas');
            lista.innerHTML = "";
            let totalG = 0; let rendM = 0;

            dados.gastos.filter(g => g.mes === mesAtual).forEach(g => {
                totalG += g.valor; rendM = g.rend;
                lista.innerHTML += `
                    <div class="card card-premium p-3 mb-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span class="tag-categoria" style="background: ${cores[g.cat]}22; color: ${cores[g.cat]}">${g.cat}</span>
                                <div class="fw-bold mt-1">${g.desc}</div>
                            </div>
                            <div class="text-end">
                                <div class="fw-bold">${formatar(g.valor)}</div>
                            </div>
                        </div>
                    </div>`;
            });

            const percent = rendM > 0 ? Math.min((totalG / rendM) * 100, 100) : 0;
            document.getElementById('barraProgresso').style.width = percent + "%";
            document.getElementById('percentualGasto').innerText = percent.toFixed(0) + "%";
            document.getElementById('resumoSaldo').innerText = formatar(rendM - totalG);
            document.getElementById('resumoPoupanca').innerText = formatar(dados.cofre);
            document.getElementById('totalCofre').innerText = formatar(dados.cofre);
        }

        function limparTudo() { if(confirm("Deseja apagar todos os registros Premium?")) { dados = { gastos: [], cofre: 0 }; salvar(); } }
        renderizar();
    </script>
</body>
</html>
