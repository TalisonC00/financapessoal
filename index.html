<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Pro 🛠️</title>
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json?v=6">
    <meta name="theme-color" content="#121212">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --accent: #2ecc71; --bg: #121212; --card: #1e1e1e; 
            --in: #2ecc71; --out: #e74c3c; --border: #333;
        }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER */
        .premium-header { background: linear-gradient(135deg, #0f0c29, #1b3a1b); padding: 40px 20px 60px; border-radius: 0 0 30px 30px; text-align: center; }
        .month-selector-top { max-width: 150px; margin: 0 auto; background: rgba(255, 255, 255, 0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; font-weight: bold; border-radius: 50px; text-align-last: center; }
        
        /* NAVIGATION */
        .nav-custom { background: #252525; border-radius: 12px; display: flex; padding: 5px; margin: -30px 15px 20px; position: relative; z-index: 20; border: 1px solid var(--border); }
        .nav-item-custom { flex: 1; text-align: center; padding: 10px; color: #888; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .nav-item-custom.active { background: var(--accent); color: #000; font-weight: bold; }

        .aba-content { display: none; }
        .aba-content.active { display: block; }

        /* CARDS E INPUTS */
        .card-p { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 15px; padding: 20px; }
        .form-control { background-color: #252525 !important; border: 1px solid var(--border) !important; color: #fff !important; margin-bottom: 12px; border-radius: 10px; padding: 12px; }
        .form-control::placeholder { color: #666 !important; }

        /* PADRONIZAÇÃO DE BOTÕES (TODOS IGUAIS) */
        .btn-main { 
            border: none; border-radius: 12px; padding: 14px; font-weight: 800; width: 100%; 
            text-transform: uppercase; transition: 0.3s; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-verde { background-color: var(--in); color: #000; }
        .btn-vermelho { background-color: var(--out); color: #fff; }
        
        /* Estado desativado (opacidade) mas mantendo o estilo */
        .btn-main:disabled { opacity: 0.25; cursor: not-allowed; }

        /* TOAST E MODAL */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 50px; border: 1px solid var(--accent); z-index: 9999; display: none; }
        #modalConfirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-box { background: #1e1e1e; padding: 25px; border-radius: 20px; text-align: center; width: 85%; border: 1px solid var(--border); }
    </style>
</head>
<body class="pb-5">

    <div id="toast"></div>

    <div id="modalConfirm">
        <div class="modal-box">
            <h5 class="mb-3">Apagar este registro? 🗑️</h5>
            <div class="d-flex gap-2">
                <button onclick="fecharModal()" class="btn btn-secondary w-100 rounded-pill">Não</button>
                <button id="btnConfirmarDelete" class="btn btn-danger w-100 rounded-pill">Sim, apagar</button>
            </div>
        </div>
    </div>

    <div class="premium-header">
        <select id="mes" class="form-select month-selector-top mb-3" onchange="renderizar()"></select>
        <small class="text-uppercase opacity-50">Saldo Consolidado</small>
        <h1 class="display-4 fw-bold mb-3" id="resumoSaldo">R$ 0,00</h1>
        <div class="d-flex gap-2 justify-content-center">
            <div style="background: rgba(46, 204, 113, 0.1); padding: 5px 15px; border-radius: 10px; border: 1px solid rgba(46, 204, 113, 0.2);">
                <i class="bi bi-arrow-up text-success"></i> <span id="resumoEntradas">R$ 0,00</span>
            </div>
            <div style="background: rgba(231, 76, 60, 0.1); padding: 5px 15px; border-radius: 10px; border: 1px solid rgba(231, 76, 60, 0.2);">
                <i class="bi bi-arrow-down text-danger"></i> <span id="resumoSaidas">R$ 0,00</span>
            </div>
        </div>
    </div>

    <div class="nav-custom shadow-sm">
        <div class="nav-item-custom active" onclick="trocarAba('aba-n', this)"><i class="bi bi-plus-lg fs-5"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-e', this)"><i class="bi bi-journal-text fs-5"></i></div>
        <div class="nav-item-custom" onclick="trocarAba('aba-p', this)"><i class="bi bi-shield-lock fs-5"></i></div>
    </div>

    <div class="container">
        <div id="aba-n" class="aba-content active">
            <div class="card-p">
                <div class="btn-group w-100 mb-3" style="border: 1px solid var(--border); border-radius: 10px; overflow: hidden;">
                    <input type="radio" class="btn-check" name="tp" id="tE" value="Entrada" checked onchange="ajustarBotaoMain()">
                    <label class="btn btn-outline-success border-0 py-2" for="tE">Entrada</label>
                    <input type="radio" class="btn-check" name="tp" id="tS" value="Saída" onchange="ajustarBotaoMain()">
                    <label class="btn btn-outline-danger border-0 py-2" for="tS">Saída</label>
                </div>
                <input type="text" id="desc" class="form-control" placeholder="Descrição (Ex: Salário)">
                <input type="number" id="val" class="form-control" placeholder="Valor R$" oninput="ajustarBotaoMain()">
                <input type="text" id="coment" class="form-control" placeholder="⚠️ Comentário (Opcional)">
                <button id="btnPrincipal" onclick="add()" class="btn-main btn-verde" disabled>Registrar Entrada</button>
            </div>

            <div class="card-p">
                <h6 class="text-uppercase fw-bold mb-3" style="font-size: 0.7rem; color: var(--accent); letter-spacing: 1px;">
                    <i class="bi bi-bar-chart-fill me-2"></i>Previsão Mês Atual
                </h6>
                <div style="height: 160px;"><canvas id="graficoPrevisao"></canvas></div>
                <div class="mt-3 text-center small fw-bold"><span id="analiseTexto" class="text-muted">Aguardando dados...</span></div>
            </div>
        </div>

        <div id="aba-e" class="aba-content"><div id="list"></div></div>

        <div id="aba-p" class="aba-content">
            <div class="card-p text-center mb-3">
                <div class="mb-2"><i class="bi bi-safe2 text-success" style="font-size: 3rem;"></i></div>
                <h2 class="fw-bold mb-4" id="totalCofre">R$ 0,00</h2>
                <input type="number" id="valP" class="form-control text-center" placeholder="Valor R$" oninput="validarBotoesCofre()">
                <input type="text" id="comentCofre" class="form-control text-center" placeholder="⚠️ Motivo (Opcional)">
                <div class="d-flex gap-2">
                    <button id="btnDep" onclick="poup('add')" class="btn-main btn-verde" disabled>Depositar</button>
                    <button id="btnRes" onclick="poup('sub')" class="btn-main btn-vermelho" disabled>Resgatar</button>
                </div>
            </div>
            <div id="listCofre"></div>
        </div>
    </div>

    <script>
        let dados = JSON.parse(localStorage.getItem('fin_v_pro_v6')) || { transacoes: [], cofre: 0, histCofre: [] };
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const selMes = document.getElementById('mes');
        meses.forEach((m, i) => { const opt = document.createElement('option'); opt.value = m; opt.text = m; if(i === new Date().getMonth()) opt.selected = true; selMes.add(opt); });

        let chart = null;

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        function trocarAba(id, el) { document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active')); document.querySelectorAll('.nav-item-custom').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); renderizar(); }
        
        function ajustarBotaoMain() { 
            const t = document.querySelector('input[name="tp"]:checked').value; 
            const v = parseFloat(document.getElementById('val').value) || 0;
            const b = document.getElementById('btnPrincipal'); 
            b.className = t === "Saída" ? "btn-main btn-vermelho" : "btn-main btn-verde"; 
            b.innerText = t === "Saída" ? "Registrar Gasto" : "Registrar Entrada"; 
            b.disabled = v <= 0;
        }

        function validarBotoesCofre() {
            const v = parseFloat(document.getElementById('valP').value) || 0;
            document.getElementById('btnDep').disabled = v <= 0;
            document.getElementById('btnRes').disabled = v <= 0;
        }

        function add() {
            const d = document.getElementById('desc').value, v = parseFloat(document.getElementById('val').value) || 0, t = document.querySelector('input[name="tp"]:checked').value, c = document.getElementById('coment').value;
            if (!d || v <= 0) return;
            dados.transacoes.push({ id: Date.now(), mes: selMes.value, d, v, tp: t, coment: c });
            salvar(); document.getElementById('desc').value = ""; document.getElementById('val').value = ""; document.getElementById('coment').value = "";
            ajustarBotaoMain(); showToast("Registrado!");
        }

        function poup(tipo) {
            const v = parseFloat(document.getElementById('valP').value) || 0, c = document.getElementById('comentCofre').value;
            if (v <= 0) return;
            dados.histCofre.unshift({ id: Date.now(), v, tipo, coment: c, data: new Date().toLocaleDateString() });
            document.getElementById('valP').value = ""; document.getElementById('comentCofre').value = "";
            validarBotoesCofre(); salvar(); showToast("Cofre atualizado!");
        }

        let idApagar = null, tipoApagar = '';
        function abrirModal(id, tipo) { idApagar = id; tipoApagar = tipo; document.getElementById('modalConfirm').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalConfirm').style.display = 'none'; }
        document.getElementById('btnConfirmarDelete').onclick = function() {
            if(tipoApagar === 't') dados.transacoes = dados.transacoes.filter(x => x.id !== idApagar); else dados.histCofre = dados.histCofre.filter(x => x.id !== idApagar);
            salvar(); fecharModal();
        };

        function salvar() { localStorage.setItem('fin_v_pro_v6', JSON.stringify(dados)); renderizar(); }

        function renderizar() {
            const list = document.getElementById('list'), listC = document.getElementById('listCofre');
            list.innerHTML = ""; listC.innerHTML = "";
            let entM = 0, saiM = 0, salC = 0;

            dados.transacoes.filter(t => t.mes === selMes.value).forEach(t => {
                const isE = t.tp === "Entrada"; if(isE) entM += t.v; else saiM += t.v;
                list.innerHTML += `<div class="card-p mb-2" style="border-left: 4px solid ${isE ? 'var(--in)' : 'var(--out)'}; padding: 12px; background: #1a1a1a;"><div class="d-flex justify-content-between align-items-center"><div onclick="abrirModal(${t.id}, 't')"><b>${t.d}</b></div><div class="${isE ? 'text-success' : 'text-danger'} fw-bold">${isE ? '+' : '-'}${t.v.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'})}</div></div>${t.coment ? `<div class="comentario-box">⚠️ ${t.coment}</div>` : ''}</div>`;
            });

            dados.histCofre.forEach(x => {
                const isA = x.tipo === 'add'; if(isA) salC += x.v; else salC -= x.v;
                listC.innerHTML += `<div class="card-p mb-2 py-2" style="border-left: 3px solid ${isA ? 'var(--in)' : 'var(--out)'}; background: #1a1a1a;"><div class="d-flex justify-content-between"><span><i class="bi bi-trash3 me-2 opacity-50" onclick="abrirModal(${x.id}, 'h')"></i><small class="text-muted">${x.data}</small></span><span class="${isA ? 'text-success' : 'text-danger'} fw-bold">R$ ${x.v.toFixed(2)}</span></div>${x.coment ? `<div class="comentario-box">⚠️ ${x.coment}</div>` : ''}</div>`;
            });

            document.getElementById('resumoEntradas').innerText = "R$ " + entM.toFixed(2);
            document.getElementById('resumoSaidas').innerText = "R$ " + saiM.toFixed(2);
            document.getElementById('resumoSaldo').innerText = "R$ " + (entM - saiM).toFixed(2);
            document.getElementById('totalCofre').innerText = "R$ " + salC.toFixed(2);
            
            atualizarGrafico(entM, saiM);
        }

        function atualizarGrafico(e, s) {
            const ctx = document.getElementById('graficoPrevisao').getContext('2d');
            const lbls = [selMes.value, meses[(meses.indexOf(selMes.value)+1)%12], meses[(meses.indexOf(selMes.value)+2)%12]];
            
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lbls,
                    datasets: [
                        { label: 'Ganho', data: [e, e, e], backgroundColor: '#2ecc71', borderRadius: 6 },
                        { label: 'Gasto', data: [s, s, s], backgroundColor: '#e74c3c', borderRadius: 6 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#888' }, grid: { display: false } } } }
            });
            const p = e > 0 ? ((s/e)*100).toFixed(0) : 0;
            const el = document.getElementById('analiseTexto');
            el.innerText = e > 0 || s > 0 ? `Análise: ${p}% da renda comprometida` : "Aguardando dados...";
            el.className = p > 80 ? 'text-danger fw-bold' : 'text-success fw-bold';
        }

        renderizar();
        ajustarBotaoMain();
        validarBotoesCofre();
    </script>
</body>
</html>
