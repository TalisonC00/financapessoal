<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro R$</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #00b894;
            --income: #2ecc71;
            --expense: #ff7675; /* Vermelho mais suave para o fundo azul */
            --bg: #f4f7f6;
        }
        body { background-color: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; }
        .premium-header {
            background: linear-gradient(135deg, #0984e3, #00b894);
            color: white; padding: 35px 20px; border-radius: 0 0 25px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card-premium {
            background: white; border: none; border-radius: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 15px;
        }
        .nav-pills { background: #e9ecef; border-radius: 50px; padding: 4px; }
        .nav-link.active { background-color: var(--primary) !important; border-radius: 50px; box-shadow: 0 4px 8px rgba(0,184,148,0.2); }
        .btn-delete { color: #fab1a0; cursor: pointer; transition: 0.2s; }
        .btn-delete:hover { color: #e74c3c; }
        .badge-income { color: #2ecc71; font-weight: bold; }
        .badge-expense { color: #ff7675; font-weight: bold; }
    </style>
</head>
<body class="pb-5">

    <div class="premium-header text-center">
        <small class="text-uppercase" style="letter-spacing: 1px; opacity: 0.9;">Saldo em Conta</small>
        <h1 class="display-6 fw-bold mb-1" id="resumoSaldo">R$ 0,00</h1>
        
        <div class="d-flex justify-content-center gap-4 mt-3">
            <div class="small d-flex align-items-center gap-1">
                <i class="bi bi-arrow-up-circle-fill" style="color: #2ecc71;"></i> 
                <span>Entradas:</span>
                <span id="resumoEntradas" class="fw-bold">R$ 0,00</span>
            </div>
            <div class="small d-flex align-items-center gap-1">
                <i class="bi bi-arrow-down-circle-fill" style="color: #ff7675;"></i> 
                <span>Saídas:</span>
                <span id="resumoSaidas" class="fw-bold">R$ 0,00</span>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <ul class="nav nav-pills nav-fill mb-4 shadow-sm" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#aba-novo"><i class="bi bi-plus-lg"></i> Novo</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-extrato"><i class="bi bi-list-ul"></i> Extrato</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#aba-poupanca"><i class="bi bi-piggy-bank"></i> Cofre</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="aba-novo">
                <div class="card card-premium p-4">
                    <h6 class="text-muted mb-3 text-center">Registrar Movimentação</h6>
                    
                    <select id="mes" class="form-select border-0 bg-light mb-3" onchange="renderizar()">
                        <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
                        <option>Abril</option><option>Maio</option><option>Junho</option>
                        <option>Julho</option><option>Agosto</option><option>Setembro</option>
                        <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
                    </select>

                    <div class="btn-group w-100 mb-3" role="group">
                        <input type="radio" class="btn-check" name="tipo" id="tipoEntrada" value="Entrada" checked>
                        <label class="btn btn-outline-success" for="tipoEntrada">Entrada</label>
                        <input type="radio" class="btn-check" name="tipo" id="tipoSaida" value="Saída">
                        <label class="btn btn-outline-danger" for="tipoSaida">Saída</label>
                    </div>

                    <input type="text" id="desc" class="form-control mb-2 border-0 bg-light" placeholder="Ex: Salário, Aluguel...">
                    <input type="number" id="valor" class="form-control mb-4 border-0 bg-light" placeholder="Valor (R$)">
                    
                    <button onclick="adicionarRegistro()" class="btn btn-success w-100 py-3 fw-bold rounded-3 shadow-sm">
                        Confirmar Registro
                    </button>
                </div>
            </div>

            <div class="tab-pane fade" id="aba-extrato">
                <div id="listaExtrato"></div>
            </div>

            <div class="tab-pane fade" id="aba-poupanca">
                <div class="card card-premium p-4 text-center">
                    <div class="mb-2"><i class="bi bi-wallet2 text-primary display-4"></i></div>
                    <h6 class="text-muted">Saldo Acumulado no Cofre</h6>
                    <h2 class="fw-bold text-primary mb-4" id="totalCofre">R$ 0,00</h2>
                    
                    <input type="number" id="valorPoupanca" class="form-control mb-3 border-0 bg-light text-center" placeholder="Valor R$">
                    <div class="d-flex gap-2">
                        <button onclick="gerirPoupanca('add')" class="btn btn-primary w-100">Depositar</button>
                        <button onclick="gerirPoupanca('sub')" class="btn btn-outline-danger w-100">Resgatar</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <button onclick="limparTudo()" class="btn btn-sm text-muted opacity-50 border-0">Limpar todo o histórico</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let dados = JSON.parse(localStorage.getItem('financas_pro')) || { transacoes: [], cofre: 0 };

        function formatar(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function adicionarRegistro() {
            const mes = document.getElementById('mes').value;
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('valor').value) || 0;
            const tipo = document.querySelector('input[name="tipo"]:checked').value;

            if (!desc || valor <= 0) {
                alert("Insira a descrição e o valor!");
                return;
            }

            const id = Date.now();
            dados.transacoes.push({ id, mes, desc, valor, tipo });
            salvar();
            
            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
            alert("Registrado!");
        }

        function removerRegistro(id) {
            if(confirm("Deseja apagar este registro?")) {
                dados.transacoes = dados.transacoes.filter(t => t.id !== id);
                salvar();
            }
        }

        function gerirPoupanca(t) {
            const v = parseFloat(document.getElementById('valorPoupanca').value) || 0;
            if (v <= 0) return;
            dados.cofre = (t === 'add') ? dados.cofre + v : dados.cofre - v;
            document.getElementById('valorPoupanca').value = "";
            salvar();
        }

        function salvar() {
            localStorage.setItem('financas_pro', JSON.stringify(dados));
            renderizar();
        }

        function renderizar() {
            const mesAtual = document.getElementById('mes').value;
            const lista = document.getElementById('listaExtrato');
            lista.innerHTML = "";

            let entTotal = 0; let saiTotal = 0;

            const itensFiltrados = dados.transacoes.filter(t => t.mes === mesAtual);

            if (itensFiltrados.length === 0) {
                lista.innerHTML = `<div class="text-center opacity-50 py-5">Nenhum registro em ${mesAtual}</div>`;
            }

            itensFiltrados.forEach((t) => {
                const isEntrada = t.tipo === "Entrada";
                if(isEntrada) entTotal += t.valor; else saiTotal += t.valor;

                lista.innerHTML += `
                    <div class="card card-premium p-3 mb-2 border-start border-4 ${isEntrada ? 'border-success' : 'border-danger'}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center gap-3">
                                <i class="bi bi-trash btn-delete fs-5" onclick="removerRegistro(${t.id})"></i>
                                <div>
                                    <small class="text-muted d-block" style="font-size: 0.7rem;">${t.tipo}</small>
                                    <strong class="d-block">${t.desc}</strong>
                                </div>
                            </div>
                            <div class="${isEntrada ? 'text-success' : 'text-danger'} fw-bold">
                                ${isEntrada ? '+' : '-'} ${formatar(t.valor)}
                            </div>
                        </div>
                    </div>`;
            });

            document.getElementById('resumoEntradas').innerText = formatar(entTotal);
            document.getElementById('resumoSaidas').innerText = formatar(saiTotal);
            document.getElementById('resumoSaldo').innerText = formatar(entTotal - saiTotal);
            document.getElementById('totalCofre').innerText = formatar(dados.cofre);
        }

        function limparTudo() { if(confirm("CUIDADO: Isso apagará tudo. Continuar?")) { dados = { transacoes: [], cofre: 0 }; salvar(); } }

        renderizar();
    </script>
</body>
</html>
